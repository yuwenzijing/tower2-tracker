<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永恒之塔2 · 统计</title>
<style>
  :root {
    --bg: #080c16;
    --bg-card: rgba(16,22,40,0.75);
    --bg-card-hover: rgba(24,32,56,0.85);
    --bg-char: rgba(12,18,32,0.7);
    --border: rgba(40,56,90,0.45);
    --border-glow: rgba(60,90,140,0.6);
    --gold: #f0cc55;
    --gold-dim: #b09a42;
    --blue: #5aabff;
    --blue-dim: #3468b0;
    --cyan: #22ddff;
    --green: #5ae890;
    --red: #ff8080;
    --purple: #c89dff;
    --text: #e8ecf4;
    --text-dim: #90a4c4;
    --text-faint: #607090;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.05);
    --glass-blur: blur(16px);
    --glass-bg: rgba(16,22,42,0.6);
    --glass-border: rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% -5%, rgba(34,221,255,0.10), transparent 45%),
      radial-gradient(ellipse at 85% 100%, rgba(240,204,85,0.06), transparent 45%),
      radial-gradient(ellipse at 50% 50%, rgba(90,100,255,0.03), transparent 60%);
  }

  /* ===== Header ===== */
  header {
    text-align: center;
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--glass-border);
    background: linear-gradient(180deg, rgba(34,221,255,0.07), rgba(90,170,255,0.02), transparent);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), #80d0ff, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(34,221,255,0.15);
  }
  .version-tag {
    font-size: 13px;
    font-weight: 400;
    -webkit-text-fill-color: var(--text-faint);
    opacity: 0.7;
    letter-spacing: 1px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ===== Today Activities ===== */
  .today-activities {
    background: var(--glass-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0;
    overflow: hidden;
    flex-shrink: 0;
    min-width: 160px;
    max-width: 220px;
  }
  .today-activities-head {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(34,221,255,0.04);
  }
  .today-activities-body {
    position: relative;
    overflow: hidden;
    min-height: 32px;
  }
  .activity-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text-dim);
    transition: color 0.3s, background 0.3s;
    white-space: nowrap;
  }
  .activity-item .act-time {
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .activity-item .act-name {
    color: var(--text);
  }
  .activity-item.urgent .act-time,
  .activity-item.urgent .act-name {
    color: var(--red);
    font-weight: 600;
  }
  .activity-item.urgent {
    background: rgba(255,128,128,0.06);
  }

  /* ===== Summary Bar ===== */
  .summary-bar-wrap {
    border-bottom: 1px solid var(--glass-border);
    background: rgba(10,14,26,0.4);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
  }
  .summary-bar {
    display: flex;
    gap: 14px;
    padding: 16px 20px;
    flex-wrap: wrap;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
  }
  .summary-chip {
    background: var(--glass-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    text-align: center;
    min-width: 120px;
    flex-shrink: 0;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .summary-chip .val {
    font-size: 22px;
    font-weight: 700;
    color: var(--red);
  }
  .summary-chip.gold .val { color: var(--gold); }
  .summary-chip.cyan .val { color: var(--cyan); }
  .summary-chip .label {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 3px;
  }
  /* 总剩余奥德感叹号提示 */
  .aode-tip-btn {
    display: inline-block;
    margin-left: 3px;
    color: var(--cyan);
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    user-select: none;
    opacity: 0.7;
    font-size: inherit;
  }
  .aode-tip-btn:hover { opacity: 1; }
  .aode-tip-popup {
    display: none;
    position: absolute;
    top: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--glass-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    z-index: 200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .aode-tip-popup.show { display: block; }
  .aode-tip-popup::before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-bottom-color: var(--border);
  }
  .cap-names {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-wrap: wrap;
    align-items: flex-start;
    align-content: flex-start;
    flex: 1;
    max-height: calc(32px * 3 + 8px);
  }
  .cap-name-badge {
    padding: 4px 14px;
    border-radius: 8px;
    background: rgba(255,128,128,0.08);
    border: 1px solid rgba(255,128,128,0.25);
    color: var(--red);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    line-height: 1.4;
    transition: all 0.2s;
    user-select: none;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .cap-name-badge:hover {
    background: rgba(255,128,128,0.16);
    border-color: var(--red);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255,128,128,0.12);
  }
  .cap-names-empty {
    color: var(--text-faint);
    font-size: 13px;
  }

  /* ===== Main ===== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
  }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar h2 {
    font-size: 16px;
    color: var(--text-dim);
    font-weight: 500;
    flex-shrink: 0;
  }
  .simple-mode-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
    user-select: none;
    flex: 1;
    justify-content: center;
    white-space: nowrap;
  }
  .simple-mode-toggle input { cursor: pointer; width: 15px; height: 15px; accent-color: var(--purple); }
  .toolbar-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .tool-btn {
    padding: 7px 16px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--glass-bg);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .tool-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text);
    border-color: var(--blue);
    box-shadow: 0 2px 12px rgba(90,170,255,0.1);
  }
  .tool-btn.export:hover { color: var(--cyan); border-color: var(--cyan); box-shadow: 0 2px 12px rgba(34,221,255,0.12); }
  .tool-btn.import:hover { color: var(--gold); border-color: var(--gold); box-shadow: 0 2px 12px rgba(240,204,85,0.12); }
  .tool-btn.sync:hover { color: var(--green); border-color: var(--green); box-shadow: 0 2px 12px rgba(90,232,144,0.12); }

  /* ===== Sync ===== */
  .sync-status {
    font-size: 12px;
    color: var(--text-faint);
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .sync-status.synced { color: var(--green); }
  .sync-status.syncing { color: var(--blue); }
  .sync-status.error { color: var(--red); }
  .sync-status .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .sync-status.syncing .sync-dot { animation: syncPulse 1s infinite; }
  @keyframes syncPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .sync-modal-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .sync-modal-overlay.show { display: flex; }
  .sync-modal {
    background: var(--bg-card);
    border: 1px solid var(--border-glow);
    border-radius: var(--radius);
    padding: 24px 24px 20px;
    max-width: 480px;
    position: relative;
    width: 90%;
    box-shadow: var(--shadow);
  }
  .sync-modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 28px;
    height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-faint);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    line-height: 1;
  }
  .sync-modal-close:hover { color: var(--text); border-color: var(--text-dim); background: rgba(255,255,255,0.04); }
  .sync-modal h3 {
    font-size: 16px;
    margin-bottom: 16px;
    color: var(--text);
    padding-right: 36px;
  }
  .sync-modal p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .sync-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .sync-input:focus { border-color: var(--cyan); }
  .sync-input::placeholder { color: var(--text-faint); }
  .sync-modal-actions {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 16px;
  }
  .sync-modal-actions.cols-2 {
    grid-template-columns: repeat(2, 1fr);
  }
  .sync-btn {
    padding: 10px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--glass-bg);
    color: var(--text-dim);
    white-space: nowrap;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .sync-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .sync-btn.primary {
    background: rgba(34,221,255,0.15);
    color: var(--cyan);
    border-color: rgba(34,221,255,0.3);
  }
  .sync-btn.primary:hover { background: rgba(34,221,255,0.25); }
  .sync-conflict-info {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .sync-conflict-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }
  .sync-conflict-row .label { color: var(--text-dim); }
  .sync-conflict-row .time { color: var(--text); font-family: monospace; font-size: 12px; }
  .sync-conflict-actions {
    display: flex;
    gap: 8px;
  }
  .sync-btn.use-local { color: var(--cyan); border-color: rgba(34,221,255,0.3); }
  .sync-btn.use-local:hover { background: rgba(34,221,255,0.1); }
  .sync-btn.use-cloud { color: var(--gold); border-color: rgba(240,204,85,0.3); }
  .sync-btn.use-cloud:hover { background: rgba(240,204,85,0.1); }

  /* ===== Account Card ===== */
  .account-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 18px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.3s;
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .account-card:hover { border-color: var(--border-glow); box-shadow: 0 4px 24px rgba(0,0,0,0.35); }
  .account-header {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    background: linear-gradient(90deg, rgba(90,170,255,0.07), rgba(34,221,255,0.02), transparent);
    border-bottom: 1px solid var(--glass-border);
    gap: 14px;
    flex-wrap: wrap;
  }
  .acc-left {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .account-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue-dim), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(90,170,255,0.2);
  }
  .account-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    border-bottom: 1px dashed transparent;
    padding: 2px 4px;
    font-family: inherit;
    min-width: 70px;
  }
  .account-name:focus { border-bottom-color: var(--blue); }
  .char-count-tag {
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .acc-stats {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    flex: 1;
    justify-content: center;
  }
  .acc-stat {
    display: flex;
    align-items: baseline;
    gap: 4px;
    white-space: nowrap;
  }
  .acc-stat .stat-label {
    color: var(--text-faint);
    font-size: 11px;
  }
  .acc-stat .stat-val {
    font-weight: 700;
    font-size: 16px;
  }
  .acc-stat.aode .stat-val { color: var(--cyan); }
  .acc-stat.dungeon .stat-val { color: var(--gold); }
  .acc-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .membership-select {
    background: rgba(8,12,22,0.6);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .membership-select:hover { border-color: var(--blue); }
  .membership-select:focus { border-color: var(--gold); box-shadow: 0 0 6px rgba(240,204,85,0.1); }
  .membership-select option { background: #101628; color: var(--text); }
  .mem-time {
    display: flex;
    align-items: center;
    gap: 2px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
  }
  .mem-time-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: var(--text-dim);
    padding: 2px 2px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    width: 28px;
    text-align: center;
    outline: none;
    transition: border-bottom-color 0.2s, color 0.2s;
    -moz-appearance: textfield;
  }
  .mem-time-input::-webkit-inner-spin-button,
  .mem-time-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .mem-time-input::placeholder { color: var(--text-faint); font-weight: 400; font-size: 10px; }
  .mem-time-input:focus { border-bottom-color: var(--blue); }
  .mem-time-unit { font-size: 11px; color: var(--text-faint); }
  .mem-time.urgent .mem-time-input,
  .mem-time.urgent .mem-time-unit { color: var(--red); font-weight: 800; }

  /* ===== Account-level save & close buttons ===== */
  .acc-save-btn {
    padding: 5px 16px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    border: 1px solid var(--border);
    flex-shrink: 0;
    color: var(--text-dim);
    background: transparent;
  }
  .acc-save-btn.active {
    background: rgba(240,204,85,0.10);
    border-color: var(--gold);
    color: var(--gold);
    animation: glowGold 2.5s ease-in-out infinite;
  }
  .acc-save-btn.active:hover {
    background: rgba(240,204,85,0.20);
    box-shadow: 0 2px 12px rgba(240,204,85,0.15);
  }
  .acc-save-btn.disabled {
    background: transparent;
    border-color: var(--border);
    color: var(--text-faint);
    cursor: not-allowed;
    opacity: 0.35;
  }
  @keyframes glowGold {
    0%, 100% { box-shadow: 0 0 4px rgba(240,204,85,0.12); }
    50% { box-shadow: 0 0 16px rgba(240,204,85,0.30); }
  }
  .icon-btn {
    cursor: pointer;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    color: var(--text-dim);
    width: 30px; height: 30px;
    border-radius: 8px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: var(--bg-card-hover); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .icon-btn.danger:hover { color: var(--red); border-color: rgba(255,80,80,0.3); background: rgba(255,80,80,0.06); }

  /* ===== Directive Section (账号指令书) ===== */
  .directive-section {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--glass-border);
    flex-wrap: wrap;
  }
  .directive-label {
    font-size: 12px;
    color: var(--text-faint);
    margin-right: 6px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .directive-item {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    font-size: 13px;
  }
  .directive-item:hover { background: rgba(255,255,255,0.04); }
  .directive-item .todo-checkbox {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--text-faint);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .directive-item.done {
    border-color: rgba(90,232,144,0.15);
    background: rgba(90,232,144,0.05);
  }
  .directive-item.done .todo-checkbox {
    border-color: var(--green);
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 6px rgba(90,232,144,0.3);
  }
  .directive-item.done .todo-label {
    color: var(--green);
  }

  /* ===== Character List ===== */
  .char-list {
    padding: 12px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .char-card {
    position: relative;
    background: var(--bg-char);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.25s, box-shadow 0.35s, opacity 0.2s;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .char-card > * { position: relative; z-index: 1; }
  .char-card:hover { border-color: var(--border-glow); box-shadow: 0 2px 16px rgba(0,0,0,0.2); }

  /* Class-based accent colors */
  .char-card.cls-sword    { --cls-color:#f87171; --cls-rgb:248,113,113; }
  .char-card.cls-guardian { --cls-color:#4a9eff; --cls-rgb:74,158,255; }
  .char-card.cls-chanter  { --cls-color:#f59e0b; --cls-rgb:245,158,11; }
  .char-card.cls-cleric   { --cls-color:#4ade80; --cls-rgb:74,222,128; }
  .char-card.cls-ranger   { --cls-color:#84cc16; --cls-rgb:132,204,22; }
  .char-card.cls-sorcerer { --cls-color:#c084fc; --cls-rgb:192,132,252; }
  .char-card.cls-spirit   { --cls-color:#06b6d4; --cls-rgb:6,182,212; }
  .char-card.cls-assassin { --cls-color:#a78bfa; --cls-rgb:167,139,250; }
  .char-card.cls-fighter  { --cls-color:#e8c547; --cls-rgb:232,197,71; }
  .char-card[class*="cls-"] {
    border-left: 3px solid var(--cls-color);
    background: linear-gradient(90deg, rgba(var(--cls-rgb),0.04), var(--bg-char) 40%);
  }
  .char-card[class*="cls-"]:hover {
    border-left-color: var(--cls-color);
    box-shadow: -4px 0 16px rgba(var(--cls-rgb),0.08);
  }
  .char-card.highlight {
    border-color: var(--gold) !important;
    box-shadow: 0 0 28px rgba(240,204,85,0.25), inset 0 0 40px rgba(240,204,85,0.03);
    animation: pulse 0.5s ease-in-out 3;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.01); }
  }

  /* Drag and drop */
  .char-card.dragging {
    opacity: 0.4;
    border-color: var(--purple) !important;
  }
  .char-card.drag-over {
    border-color: var(--purple) !important;
    box-shadow: 0 0 16px rgba(200,157,255,0.2);
  }
  .char-header[draggable="true"] { cursor: grab; }
  .char-header[draggable="true"]:active { cursor: grabbing; }
  .char-header[draggable="true"] input { cursor: text; }
  .char-header[draggable="true"] select { cursor: pointer; }

  /* Character delete (hover) */
  .char-delete {
    position: absolute;
    top: 1px;
    right: 1px;
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-faint);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, color 0.2s;
    z-index: 10;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .char-card:hover .char-delete { opacity: 0.45; }
  .char-delete:hover { opacity: 1 !important; color: var(--red); border-color: rgba(255,80,80,0.3); background: rgba(255,80,80,0.08); }

  .char-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--glass-border);
    gap: 8px;
    flex-wrap: nowrap;
    background: rgba(255,255,255,0.01);
  }
  .char-header .left {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1 1 0;
    min-width: 0;
    flex-wrap: nowrap;
  }
  .char-header .center {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 0 0 auto;
    flex-wrap: nowrap;
  }
  .char-header .right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1 1 0;
    justify-content: flex-end;
    flex-wrap: nowrap;
    margin-right: 8px;
  }
  .char-icon { font-size: 16px; }
  .char-icon-img {
    height: 28px;
    width: 28px;
    object-fit: contain;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .char-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: transparent;
    border: none;
    outline: none;
    border-bottom: 1px dashed transparent;
    padding: 2px 2px;
    font-family: inherit;
    min-width: 70px;
    flex: 1 1 auto;
    width: auto;
  }
  .char-name:focus { border-bottom-color: var(--purple); }
  .char-name::placeholder { color: var(--text-faint); font-weight: 400; font-size: 12px; }

  /* ===== Class Dropdown ===== */
  .class-select {
    background: rgba(8,12,22,0.6);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 4px;
    border-radius: 6px;
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    flex-shrink: 0;
  }
  .class-select:hover { border-color: var(--purple); }
  .class-select:focus { border-color: var(--gold); }
  .class-select option { background: #101628; color: var(--text); }

  /* ===== Stat Inputs (Item Level / Combat Power) ===== */
  .stat-group {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .stat-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: var(--text);
    padding: 2px 2px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    width: 48px;
    text-align: center;
    outline: none;
    transition: border-bottom-color 0.2s, color 0.2s;
    -moz-appearance: textfield;
    flex-shrink: 0;
  }
  .stat-group .stat-input { text-align: right; }
  .stat-input::-webkit-inner-spin-button,
  .stat-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .stat-input::placeholder { color: var(--text-faint); font-weight: 400; font-size: 10px; }
  .stat-input:focus { border-bottom-color: var(--gold); }
  .stat-suffix {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-faint);
  }

  /* ===== Character Subtitle (Dungeon Count) ===== */
  .char-subtitle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--glass-border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    background: linear-gradient(90deg, rgba(240,204,85,0.04), transparent);
  }
  .char-subtitle .dungeon-count {
    font-size: 16px;
    font-weight: 800;
    color: var(--gold);
  }
  .char-subtitle .dungeon-unit {
    font-size: 11px;
    color: var(--gold-dim);
    font-weight: 600;
  }

  /* ===== Energy Pools (simplified) ===== */
  .energy-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 10px 14px;
  }
  .energy-pool {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    transition: all 0.3s;
    min-width: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    text-align: center;
    display: flex;
    flex-direction: column;
  }
  .energy-pool.white {
    border-left: 3px solid var(--cyan);
    box-shadow: inset 2px 0 12px rgba(34,221,255,0.06);
    background: linear-gradient(to right, rgba(34,221,255,0.08), rgba(34,221,255,0.02) 50%, transparent);
  }
  .energy-pool.blue {
    border-left: 3px solid var(--blue);
    box-shadow: inset 2px 0 12px rgba(90,170,255,0.06);
    background: linear-gradient(to right, rgba(90,170,255,0.08), rgba(90,170,255,0.02) 50%, transparent);
  }
  .pool-title {
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 4px;
  }
  .pool-title.white-title { color: var(--cyan); }
  .pool-title.blue-title { color: var(--blue); }
  .energy-display {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
    margin: 2px 0;
  }
  .energy-input-simple {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: var(--text);
    padding: 2px 2px;
    font-size: 18px;
    font-weight: 700;
    font-family: inherit;
    width: 64px;
    text-align: center;
    outline: none;
    transition: border-bottom-color 0.2s;
    -moz-appearance: textfield;
  }
  .energy-input-simple:focus { border-bottom-color: var(--gold); }
  .energy-input-simple::-webkit-inner-spin-button,
  .energy-input-simple::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* Backpack aode */
  .backpack-aode {
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px dashed var(--glass-border);
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    min-height: 28px;
  }
  .backpack-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: var(--text);
    padding: 1px 2px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    width: 34px;
    text-align: center;
    outline: none;
    transition: border-bottom-color 0.2s;
    -moz-appearance: textfield;
  }
  .backpack-input:focus { border-bottom-color: var(--gold); }
  .backpack-input::-webkit-inner-spin-button,
  .backpack-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  .backpack-input::placeholder { color: var(--text-faint); font-weight: 400; font-size: 10px; }
  .backpack-energy-hint {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
  }
  .recovery-info {
    text-align: center;
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
    margin-top: auto;
    padding-top: 6px;
    border-top: 1px dashed var(--glass-border);
    min-height: 28px;
    line-height: 1.4;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .recovery-info .time { color: var(--gold); font-weight: 600; }
  .recovery-info .full-tag { color: var(--green); font-weight: 600; }

  /* ===== Todo Section ===== */
  .todo-section {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 10px 14px;
    border-top: 1px solid var(--glass-border);
  }
  .todo-section.sanctuary-row { border-top: none; }
  .todo-subtitle {
    padding: 7px 14px;
    border-top: 1px solid var(--glass-border);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    background: linear-gradient(90deg, rgba(90,170,255,0.08), rgba(34,221,255,0.03));
  }
  .todo-subtitle .todo-count { font-weight: 800; }
  .todo-subtitle .todo-count.all { color: var(--green); }
  .todo-subtitle .todo-count.none { color: var(--red); }
  .todo-subtitle .todo-count.partial { color: #e8c040; }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    font-size: 12px;
    min-width: 0;
    overflow: hidden;
  }
  .todo-item:hover { border-color: var(--border-glow); background: rgba(255,255,255,0.03); }
  .todo-item.done {
    border-color: rgba(90,232,144,0.25);
    background: rgba(90,232,144,0.05);
    box-shadow: 0 0 8px rgba(90,232,144,0.04);
  }
  .todo-checkbox {
    width: 16px; height: 16px;
    border-radius: 5px;
    border: 2px solid var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 11px;
    color: transparent;
  }
  .todo-item.done .todo-checkbox {
    border-color: var(--green);
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 6px rgba(90,232,144,0.3);
  }
  .todo-label { color: var(--text-dim); font-weight: 600; }
  .todo-item.done .todo-label { color: var(--green); }
  .todo-reset {
    font-size: 10px;
    color: var(--text-faint);
    margin-left: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .todo-reset.urgent { color: var(--gold); }
  .todo-item.abyss-span {
    grid-column: 1 / 3;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: center;
  }
  .todo-item.abyss-span .abyss-left {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .todo-item.abyss-span .todo-reset { margin-left: 11px; }

  /* Trial todo item */
  .todo-item.trial-item {
    grid-column: 3 / 4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .todo-item.trial-item .trial-left {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .todo-item.trial-item .trial-right {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-left: auto;
  }
  .trial-lv-label {
    font-size: 10px;
    color: var(--text-faint);
    font-weight: 400;
  }
  .trial-lv-input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed transparent;
    color: var(--text-faint);
    padding: 1px 0;
    font-size: 10px;
    font-weight: 400;
    font-family: inherit;
    width: 22px;
    text-align: left;
    outline: none;
    transition: border-bottom-color 0.2s;
    -moz-appearance: textfield;
  }
  .trial-lv-input:focus { border-bottom-color: var(--gold); }
  .trial-lv-input::-webkit-inner-spin-button,
  .trial-lv-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ===== Add Character Button ===== */
  .add-char-btn {
    width: 100%;
    padding: 10px;
    border: 2px dashed rgba(200,157,255,0.25);
    border-radius: 12px;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .add-char-btn:hover {
    border-color: var(--purple);
    color: var(--purple);
    background: rgba(200,157,255,0.04);
    box-shadow: 0 0 16px rgba(200,157,255,0.06);
  }

  /* ===== Empty State ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; margin-bottom: 16px; }

  /* ===== Add Account ===== */
  .add-account-btn {
    width: 100%;
    padding: 18px;
    border: 2px dashed rgba(90,170,255,0.3);
    border-radius: 16px;
    background: transparent;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .add-account-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: rgba(90,170,255,0.04);
    box-shadow: 0 0 20px rgba(90,170,255,0.06);
  }

  /* ===== Simple Mode Table ===== */
  .simple-table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    box-shadow: 0 2px 16px rgba(0,0,0,0.25);
  }
  .simple-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .simple-table th {
    padding: 14px 12px;
    text-align: center;
    border-bottom: 2px solid var(--border-glow);
    color: var(--text-dim);
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
    background: rgba(90,170,255,0.05);
  }
  .simple-table th:hover { color: var(--text); background: rgba(90,170,255,0.1); }
  .simple-table th .sort-icon {
    font-size: 10px;
    margin-left: 4px;
    color: var(--gold);
  }
  .simple-table th:not(.sortable) { cursor: default; }
  .simple-table th:not(.sortable):hover { background: rgba(90,170,255,0.05); }
  .simple-table td {
    padding: 10px 12px;
    text-align: center;
    border-bottom: 1px solid var(--glass-border);
    color: var(--text);
  }
  .simple-table tr:hover td { background: rgba(255,255,255,0.02); }
  .simple-table tr:last-child td { border-bottom: none; }
  .simple-table .char-cell {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-start;
  }
  .simple-table .char-cell img {
    height: 22px;
    width: 22px;
    object-fit: contain;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .simple-table .char-cell .char-icon-default { font-size: 16px; }
  .simple-table .char-cell .char-name-text { font-weight: 600; }
  .simple-table .acc-tag {
    font-size: 11px;
    color: var(--text-faint);
    margin-left: 2px;
  }
  .simple-table .aode-cell { font-family: "Consolas","Monaco",monospace; font-weight: 700; }
  .simple-table .aode-cell .aode-total { color: var(--cyan); }
  .simple-table .aode-cell .aode-break { color: var(--text-faint); font-size: 11px; font-weight: 400; }
  .simple-table .dungeon-cell { font-weight: 700; color: var(--gold); }
  .simple-table .todo-cell { font-weight: 700; }
  .simple-table .todo-cell.all { color: var(--green); }
  .simple-table .todo-cell.none { color: var(--red); }
  .simple-table .todo-cell.partial { color: #e8c040; }
  .simple-empty {
    text-align: center;
    padding: 40px;
    color: var(--text-faint);
  }

  /* ===== Toast ===== */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: rgba(16,22,42,0.85);
    border: 1px solid var(--border-glow);
    color: var(--text);
    padding: 12px 28px;
    border-radius: var(--radius);
    font-size: 13px;
    z-index: 200;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 1px rgba(255,255,255,0.08);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== 会员到期提醒弹窗 ===== */
  .mem-alert-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0; left: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .mem-alert-overlay.show { display: flex; }
  .mem-alert-box {
    background: #ffffff;
    border: 1px solid rgba(230,57,70,0.4);
    border-radius: var(--radius);
    padding: 22px 26px 18px;
    max-width: 440px;
    width: 90%;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
    position: relative;
  }
  .mem-alert-close-x {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    font-size: 20px;
    color: #999;
    line-height: 1;
    border: none;
    background: transparent;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .mem-alert-close-x:hover { color: #333; background: rgba(0,0,0,0.06); }
  .mem-alert-title {
    font-size: 15px;
    font-weight: 700;
    color: #e63946;
    margin-bottom: 14px;
    text-align: center;
  }
  .mem-alert-list { margin-bottom: 16px; }
  .mem-alert-item {
    color: #e63946;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.7;
    padding: 5px 0;
    border-bottom: 1px dashed rgba(230,57,70,0.25);
  }
  .mem-alert-item:last-child { border-bottom: none; }
  .mem-alert-confirm {
    display: block;
    margin: 0 auto;
    padding: 8px 36px;
    background: #e63946;
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .mem-alert-confirm:hover { opacity: 0.85; }

  /* ===== 基纳图标按钮（统计框行最左圆形） ===== */
  .kina-summary-group {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .kina-summary-val {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    white-space: nowrap;
    opacity: 0.55;
  }

  .kina-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    width: 40px;
    background: transparent;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 8px;
    padding: 0;
    transition: transform 0.15s, filter 0.2s;
  }
  .kina-icon-btn:hover { transform: scale(1.08); filter: brightness(1.12); }

  /* ===== 基纳统计弹窗 ===== */
  .kina-modal-overlay {

    justify-content: center;

  .kina-modal-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);

    max-width: 92%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 12px 48px rgba(0,0,0,0.4);

    align-items: center;

    border: none;

    margin-bottom: 14px;

  .kina-confirm-overlay {

    padding: 8px 0;

  @media (max-width: 767px) {

      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 0;
    }

// ====== 全局状态 ======
let DATA = { accounts: [] };
let dirtyChars = new Set();
let dirtyAccounts = new Set();
let simpleMode = false;
let sortState = { column: null, direction: null };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function charKey(accId, charId) { return `${accId}/${charId}`; }

function markDirty(accId, charId) { dirtyChars.add(charKey(accId, charId)); }
function isDirty(accId, charId) { return dirtyChars.has(charKey(accId, charId)); }
function markAccountDirty(accId) { dirtyAccounts.add(accId); }
function isAccountDirty(accId) {
  if (dirtyAccounts.has(accId)) return true;
  const acc = DATA.accounts.find(a => a.id === accId);
  if (!acc) return false;
  return acc.characters.some(ch => isDirty(accId, ch.id));
}

// ====== 3小时阶梯计数 ======
// 计算 from 到 to 之间经过的3小时阶梯点数量（不含from，含to）
function count3HourMarks(from, to) {
  if (to <= from) return 0;
  let count = 0;
  let dayStart = new Date(from);
  dayStart.setHours(0, 0, 0, 0);
  let iterations = 0;
  while (dayStart <= to && iterations < 400) {
    for (const h of MARK_HOURS) {
      const mark = new Date(dayStart);
      mark.setHours(h, 0, 0, 0);
      if (mark > from && mark <= to) count++;
    }
    dayStart.setDate(dayStart.getDate() + 1);
    iterations++;
  }
  return count;
}

// ====== 能量计算 ======
function getMem(acc) {
  return MEMBERSHIPS.find(m => m.key === acc.membership) || MEMBERSHIPS[0];
}

// 获取从 from 之后第 n 个 3小时标记点的时间（用于推算恢复满时间点）
function nthNext3HourMark(from, n) {
  if (n <= 0) return new Date(from);
  let count = 0;
  let dayStart = new Date(from);
  dayStart.setHours(0, 0, 0, 0);
  let iterations = 0;
  while (count < n && iterations < 400) {
    for (const h of MARK_HOURS) {
      const mark = new Date(dayStart);
      mark.setHours(h, 0, 0, 0);
      if (mark > from) {
        count++;
        if (count === n) return mark;
      }
    }
    dayStart.setDate(dayStart.getDate() + 1);
    iterations++;
  }
  return new Date(from);
}

// 白奥德：3小时阶梯增长
function calcWhiteEnergy(acc, ch) {
  const mem = getMem(acc);
  const cap = WHITE_CAP;
  const stepAmount = mem.stepAmount;

  let displayEnergy = ch.whiteEnergy;
  if (ch.whiteTimestamp && ch.whiteEnergy < cap) {
    const last = new Date(ch.whiteTimestamp);
    const now = new Date();
    const marksPassed = count3HourMarks(last, now);
    displayEnergy = Math.min(cap, ch.whiteEnergy + marksPassed * stepAmount);
  }
  const isFull = displayEnergy >= cap - 0.5;
  const remaining = Math.max(0, cap - displayEnergy);
  let hoursToCap = 0, fullTime = null;
  if (!isFull && stepAmount > 0 && remaining > 0) {
    const neededMarks = Math.ceil(remaining / stepAmount);
    fullTime = nthNext3HourMark(new Date(), neededMarks);
    hoursToCap = (fullTime - new Date()) / 3600000;
  }
  return { displayEnergy, cap, stepAmount, isFull, mem, remaining, hoursToCap, fullTime };
}

// 恢复时间格式化与渲染
function formatRecoveryTime(hours) {
  if (hours <= 0) return '已满';
  const d = Math.floor(hours / 24);
  const h = Math.floor(hours % 24);
  const m = Math.floor((hours * 60) % 60);
  let parts = [];
  if (d > 0) parts.push(`${d}天`);
  if (h > 0) parts.push(`${h}小时`);
  if (d === 0 && m > 0) parts.push(`${m}分`);
  return parts.join('') || '<1分';
}

function formatEnergyTime(fullTime) {
  if (!fullTime) return '';
  return `${fullTime.getDate()}日 ${String(fullTime.getHours()).padStart(2,'0')}:${String(fullTime.getMinutes()).padStart(2,'0')}`;
}

function renderRecoveryInfo(energy) {
  if (energy.isFull) {
    return `<span class="full-tag">已满</span>`;
  }
  const timeStr = formatRecoveryTime(energy.hoursToCap);
  const targetStr = formatEnergyTime(energy.fullTime);

function formatAodeCountdown(target) {

  const hours = Math.floor(diff / 3600000);

  return `${hours}小时${minutes}分`;

// 蓝奥德总量 = 填写数字 + 大背包*40 + 小背包*10
function calcBlueEnergyTotal(ch) {
  const large = parseInt(ch.blueBackpackLarge) || 0;
  const small = parseInt(ch.blueBackpackSmall) || 0;
  return (ch.blueEnergy || 0) + large * 40 + small * 10;
}

function calcBlueBreakdown(ch) {
  const base = ch.blueEnergy || 0;
  const large = parseInt(ch.blueBackpackLarge) || 0;
  const small = parseInt(ch.blueBackpackSmall) || 0;
  const backpack = large * 40 + small * 10;
  return { base, large, small, backpack, total: base + backpack };
}

// 单角色剩余奥德 = 白奥德 + 蓝奥德总计
function calcCharRemainingAode(acc, ch) {
  const white = calcWhiteEnergy(acc, ch);
  return Math.floor(white.displayEnergy) + calcBlueEnergyTotal(ch);
}

// 单账号剩余奥德 = 所有角色剩余之和
function calcAccountRemainingAode(acc) {
  return acc.characters.reduce((sum, ch) => sum + calcCharRemainingAode(acc, ch), 0);
}

// 单账号剩余副本 = 所有角色剩余副本之和
function calcAccountDungeonRuns(acc) {
  return acc.characters.reduce((sum, ch) => sum + calcDungeonRuns(acc, ch), 0);
}

// 副本次数
function calcDungeonRuns(acc, ch) {
  const white = calcWhiteEnergy(acc, ch);
  const totalEnergy = Math.floor(white.displayEnergy) + calcBlueEnergyTotal(ch);
  return Math.floor(totalEnergy / DUNGEON_COST);
}

// 今日白奥德是否达到上限
function isWhiteCapToday(acc, ch) {
  const energy = calcWhiteEnergy(acc, ch);
  if (energy.isFull) return true;
  const now = new Date();
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const marksUntilMidnight = count3HourMarks(now, midnight);
  const projectedEnergy = energy.displayEnergy + marksUntilMidnight * energy.stepAmount;
  return projectedEnergy >= WHITE_CAP;
}

  let daysBack = (day - 3 + 7) % 7;
  const reset = new Date(now);
  reset.setDate(now.getDate() - daysBack);
  reset.setHours(3, 0, 0, 0);
  if (reset > now) reset.setDate(reset.getDate() - 7);
  return reset;
}
function getAbyssResetPoint() {

  [3, 6].forEach(d => {
    let daysBack = (now.getDay() - d + 7) % 7;

    reset.setDate(now.getDate() - daysBack);
    reset.setHours(22, 0, 0, 0);
    if (reset > now) reset.setDate(reset.getDate() - 7);
    candidates.push(reset);

  return new Date(Math.max(candidates[0].getTime(), candidates[1].getTime()));

// ====== 会员剩余时间 ======
function calcMembershipRemaining(acc) {
  const hasMembership = acc.membershipDays !== null || acc.membershipHours !== null;
  if (!hasMembership) return { days: null, hours: null, totalMs: 0 };
  const totalMs = ((acc.membershipDays || 0) * 24 + (acc.membershipHours || 0)) * 3600000;
  let elapsed = 0;
  if (acc.membershipSetAt) {
    elapsed = Math.max(0, Date.now() - new Date(acc.membershipSetAt).getTime());
  }
  const remainingMs = Math.max(0, totalMs - elapsed);
  const remainingDays = Math.floor(remainingMs / 86400000);
  const remainingHours = Math.floor((remainingMs % 86400000) / 3600000);
  return { days: remainingDays, hours: remainingHours, totalMs: remainingMs };
}
function setMembershipDays(accId, val) {
  const acc = DATA.accounts.find(a => a.id === accId);
  if (!acc) return;
  const n = parseInt(val);
  const remaining = calcMembershipRemaining(acc);
  acc.membershipDays = (isNaN(n) || n < 0) ? null : n;
  if (remaining.hours !== null) acc.membershipHours = remaining.hours;
  acc.membershipSetAt = new Date().toISOString();
  saveData(); render();
  // 用户主动修改会员时间 → 清除12小时限制并立即检查弹窗
  localStorage.removeItem('aion2_mem_alert_last');

}

function getRatioColor(val, cap) {

  const ratio = Math.min(1, Math.max(0, val / cap));

  if (ratio < 0.9) return '#e8c040';
  return '#e84040';
}
function updateStatColor(input, val, cap) {

  input.style.color = color;

// ====== 拖拽排序（同账号内） ======
let dragData = { accId: null, charId: null };
function onCharDragStart(e, accId, charId) {
  const tag = e.target.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'OPTION' || tag === 'BUTTON' || tag === 'TEXTAREA') {
    e.preventDefault(); return;
  }
  dragData = { accId, charId };
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', charId); } catch(_) {}
  const card = e.currentTarget;
  card.classList.add('dragging');
}
function onCharDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.char-card.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onCharDragOver(e, accId) {
  if (dragData.accId !== accId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const card = e.currentTarget;
  if (card) card.classList.add('drag-over');
}
function onCharDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function onCharDrop(e, accId, targetCharId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (dragData.accId !== accId) return;
  const acc = DATA.accounts.find(a => a.id === accId);
  if (!acc) return;
  const fromIdx = acc.characters.findIndex(c => c.id === dragData.charId);
  const toIdx = acc.characters.findIndex(c => c.id === targetCharId);
  if (fromIdx === -1 || toIdx === -1 || fromIdx === toIdx) return;
  const [moved] = acc.characters.splice(fromIdx, 1);
  acc.characters.splice(toIdx, 0, moved);
  saveData(); render();
}

    el.classList.add('highlight');
    setTimeout(() => el.classList.remove('highlight'), 2500);
  }
}

// ====== 精简模式 ======
function toggleSimpleMode() {
  simpleMode = document.getElementById('simpleModeToggle').checked;
  document.getElementById('defaultView').style.display = simpleMode ? 'none' : '';
  document.getElementById('simpleView').style.display = simpleMode ? '' : 'none';
  if (simpleMode) renderSimpleMode();
}

function getTodoCount(ch) {
  return [
    isSanctuary1Done(ch), isSanctuary2Done(ch), isSanctuary3Done(ch),
    isAwakeningDone(ch), isAbyssDone(ch), isShopDone(ch), isTransformDone(ch),
    isTrialDone(ch)
  ].filter(Boolean).length;
}

function renderSimpleMode() {
  const table = document.getElementById('simpleTable');
  const rows = [];
  DATA.accounts.forEach((acc) => {
    acc.characters.forEach(ch => {
      const white = calcWhiteEnergy(acc, ch);
      const U = Math.floor(white.displayEnergy);
      const blueBd = calcBlueBreakdown(ch);
      const T = blueBd.total;
      const H = U + T;
      const dungeon = calcDungeonRuns(acc, ch);
      const todoCount = getTodoCount(ch);
      rows.push({ acc, ch, U, T, H, dungeon, todoCount });
    });
  });

  let sortedRows = [...rows];
  if (sortState.column && sortState.direction) {
    const col = sortState.column;
    const dir = sortState.direction === 'asc' ? 1 : -1;
    sortedRows.sort((a, b) => {
      let av, bv;
      if (col === 'dungeon') { av = a.dungeon; bv = b.dungeon; }
      else if (col === 'aode') { av = a.H; bv = b.H; }
      else if (col === 'todo') { av = 8 - a.todoCount; bv = 8 - b.todoCount; }
      else return 0;
      return (av - bv) * dir;
    });
  }

  const sortIcon = (col) => {
    if (sortState.column !== col) return '↕';
    if (sortState.direction === 'asc') return '↑';
    if (sortState.direction === 'desc') return '↓';
    return '↕';
  };

  if (rows.length === 0) {
    table.innerHTML = '<tbody><tr><td><div class="simple-empty">暂无角色数据</div></td></tr></tbody>';
    return;
  }

  table.innerHTML = `
    <thead>
      <tr>
        <th>角色</th>
        <th class="sortable" onclick="setSort('dungeon')">剩余副本次数 <span class="sort-icon">${sortIcon('dungeon')}</span></th>
        <th class="sortable" onclick="setSort('aode')">剩余奥德能量 <span class="sort-icon">${sortIcon('aode')}</span></th>
        <th class="sortable" onclick="setSort('todo')">每周待办事项 <span class="sort-icon">${sortIcon('todo')}</span></th>
      </tr>
    </thead>
    <tbody>
      ${sortedRows.map(r => {
        const icon = r.ch.charClass && CLASS_ICONS[r.ch.charClass]
          ? `<img src="${CLASS_ICONS[r.ch.charClass]}" alt="" />`
          : '<span class="char-icon-default">👤</span>';
        const todoClass = r.todoCount === 8 ? 'all' : r.todoCount === 0 ? 'none' : 'partial';
        return `
          <tr>
            <td>
              <div class="char-cell">
                ${icon}
                <span class="char-name-text">${escapeHtml(r.ch.name)}</span>
                <span class="acc-tag">-${escapeHtml(r.acc.name)}</span>
              </div>
            </td>
            <td class="dungeon-cell">${r.dungeon}</td>
            <td class="aode-cell"><span class="aode-total">${r.H}</span><span class="aode-break">(${r.U}+${r.T})</span></td>
            <td class="todo-cell ${todoClass}">${r.todoCount}/8</td>
          </tr>
        `;
      }).join('')}
    </tbody>
  `;
}

function setSort(column) {
  if (sortState.column !== column) {
    sortState.column = column;
    sortState.direction = 'asc';
  } else {
    if (sortState.direction === 'asc') sortState.direction = 'desc';
    else if (sortState.direction === 'desc') { sortState.column = null; sortState.direction = null; }
    else sortState.direction = 'asc';
  }
  renderSimpleMode();
}
