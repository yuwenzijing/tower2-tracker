// 实时更新（不重渲染整页）
function updateRecoveryDisplay() {
  let todoChanged = false;
  DATA.accounts.forEach(acc => {
    DIRECTIVE_ITEMS.forEach(function(d) {
      var el = document.querySelector('.directive-item[onclick*="' + d.key + '"]');
      if (el && el.classList.contains('done') !== isDirectiveDone(acc, d.key)) todoChanged = true;
    });
    acc.characters.forEach(ch => {
      const charCard = document.getElementById(`char-${acc.id}-${ch.id}`);
      if (!charCard) return;
      const todoChecks = {
        'awakening': isAwakeningDone,
        'abyss': isAbyssDone,
        'sanctuary1': isSanctuary1Done,
        'sanctuary2': isSanctuary2Done,
        'sanctuary3': isSanctuary3Done,
        'shop': isShopDone,
        'transform': isTransformDone,
        'trial': isTrialDone,
      };
      const todoItems = charCard.querySelectorAll('.todo-item[data-todo]');
      todoItems.forEach(item => {
        const fn = todoChecks[item.dataset.todo];
        if (fn && item.classList.contains('done') !== fn(ch)) todoChanged = true;
      });
    });
  });
  if (todoChanged) { render(); return; }

  // 更新白奥德输入值和副本次数
  DATA.accounts.forEach(acc => {
    acc.characters.forEach(ch => {
      const charCard = document.getElementById(`char-${acc.id}-${ch.id}`);
      if (!charCard) return;
      const energy = calcWhiteEnergy(acc, ch);
      const whiteInput = charCard.querySelector('.energy-pool.white .energy-input-simple');
      if (whiteInput && document.activeElement !== whiteInput) {
        whiteInput.value = Math.floor(energy.displayEnergy);
      }
      const dungeonEl = document.getElementById(`dungeon-${acc.id}-${ch.id}`);
      if (dungeonEl) {
        const runs = calcDungeonRuns(acc, ch);
        const countEl = dungeonEl.querySelector('.dungeon-count');
        if (countEl) countEl.textContent = runs;
      }
      // 更新背包能量提示
      const blueBd = calcBlueBreakdown(ch);
      const hintEl = charCard.querySelector('.backpack-energy-hint');
      if (hintEl) hintEl.textContent = `=${blueBd.backpack > 0 ? blueBd.backpack : ''}`;
      // 更新白奥德恢复时间
      const recEl = document.getElementById(`recovery-${acc.id}-${ch.id}`);
      if (recEl) recEl.innerHTML = renderRecoveryInfo(energy);
    });
    // 更新账号级统计
    const accAodeEl = document.getElementById(`acc-aode-${acc.id}`);
    if (accAodeEl) accAodeEl.textContent = calcAccountRemainingAode(acc);
    const accDungeonEl = document.getElementById(`acc-dungeon-${acc.id}`);
    if (accDungeonEl) accDungeonEl.textContent = calcAccountDungeonRuns(acc);
    // 会员时间
    const remaining = calcMembershipRemaining(acc);
    const daysInput = document.getElementById(`mem-days-${acc.id}`);
    const hoursInput = document.getElementById(`mem-hours-${acc.id}`);
    if (daysInput && document.activeElement !== daysInput) daysInput.value = remaining.days ?? '';
    if (hoursInput && document.activeElement !== hoursInput) hoursInput.value = remaining.hours ?? '';
    const memTimeEl = daysInput ? daysInput.closest('.mem-time') : null;
    if (memTimeEl) {
      const urgent = (remaining.days !== null || remaining.hours !== null) && (remaining.days || 0) <= 1;
      memTimeEl.classList.toggle('urgent', urgent);
    }
  });

  updateSummary();
  if (simpleMode) renderSimpleMode();
  checkMembershipAlert();

  // 刷新奥德补充倒计时（如果提示框打开中）
  const aodeTipPopup = document.getElementById('aodeTipPopup');
  if (aodeTipPopup && aodeTipPopup.classList.contains('show')) {
    updateAodeTip();
  }
}

function updateSummary() {
  let capTodayCount = 0;
  let capTodayNames = [];
  let totalDungeon = 0;
  let totalAode = 0;

  DATA.accounts.forEach(acc => {
    acc.characters.forEach(ch => {
      if (isWhiteCapToday(acc, ch)) {
        capTodayCount++;
        capTodayNames.push({ accId: acc.id, charId: ch.id, name: ch.name });
      }
      totalDungeon += calcDungeonRuns(acc, ch);
      totalAode += calcCharRemainingAode(acc, ch);
    });
  });

  document.getElementById('sumCapToday').textContent = capTodayCount;
  document.getElementById('sumDungeon').textContent = totalDungeon;
  document.getElementById('sumTotalAode').textContent = totalAode;
  const namesEl = document.getElementById('capNames');
  if (capTodayNames.length === 0) {
    namesEl.innerHTML = '<span class="cap-names-empty">暂无角色今日达到上限</span>';
  } else {
    namesEl.innerHTML = capTodayNames.map(n =>
      `<span class="cap-name-badge" onclick="jumpToChar('${n.accId}','${n.charId}')">${escapeHtml(n.name)}</span>`
    ).join('');
  }

  var kinaSum = 0;
  DATA.accounts.forEach(function(acc) {
    acc.characters.forEach(function(ch) {
      if (ch.kina !== null && ch.kina !== undefined && !isNaN(ch.kina)) kinaSum += ch.kina;
    });
  });
  var kinaSumEl = document.getElementById('kinaSummaryVal');
  if (kinaSumEl) kinaSumEl.textContent = formatKina(kinaSum);
}

// ====== 导入导出 ======
function exportData() {
  const json = JSON.stringify(DATA, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const a = document.createElement('a');
  a.href = url;
  a.download = `永恒之塔2统计_${dateStr}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const obj = JSON.parse(e.target.result);
      if (!obj.accounts || !Array.isArray(obj.accounts)) throw new Error('数据格式不正确');
      if (DATA.accounts.length > 0) {
        if (!confirm(`当前有 ${DATA.accounts.length} 个账号的数据，导入将覆盖现有数据。确定继续？`)) {
          event.target.value = '';
          return;
        }
      }
      obj.accounts.forEach(ensureAccDefaults);
      DATA = obj;
      dirtyChars.clear();
      dirtyAccounts.clear();
      saveData();
      render();
      showToast('数据导入成功');
    } catch(err) {
      alert('导入失败：' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ====== Utils ======
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ====== 会员到期提醒 ======
const MEM_ALERT_INTERVAL = 12 * 3600 * 1000; // 12小时
const MEM_ALERT_THRESHOLD = 3 * 86400000;    // 3天（剩余不足3天触发）
let memAlertShowing = false;

function checkMembershipAlert() {
  if (memAlertShowing) return;
  // 全局12小时频率限制
  const lastStr = localStorage.getItem('aion2_mem_alert_last');
  if (lastStr) {
    const last = new Date(lastStr).getTime();
    if (Date.now() - last < MEM_ALERT_INTERVAL) return;
  }
  // 收集所有即将到期的奎灵会员账号
  const urgent = [];
  DATA.accounts.forEach(acc => {
    if (acc.membership !== 'kuiling') return;
    const hasMem = acc.membershipDays !== null || acc.membershipHours !== null;
    if (!hasMem) return;
    const r = calcMembershipRemaining(acc);
    if (r.totalMs >= 0 && r.totalMs < MEM_ALERT_THRESHOLD) {
      urgent.push({ name: acc.name, days: r.days, hours: r.hours });
    }
  });
  if (urgent.length === 0) return;
  showMemAlert(urgent);
}

function showMemAlert(list) {
  memAlertShowing = true;
  const listEl = document.getElementById('memAlertList');
  listEl.innerHTML = list.map(a =>
    `<div class="mem-alert-item">${escapeHtml(a.name)} 会员即将到期，剩余时间 ${a.days}天${a.hours}小时</div>`
  ).join('');
  var el = document.getElementById('memAlertOverlay');
  if (el) { el.classList.add('show'); el.style.display = 'flex'; }
}

function closeMemAlert() {
  var el = document.getElementById('memAlertOverlay');
  if (el) { el.classList.remove('show'); el.style.display = 'none'; }
  memAlertShowing = false;
  localStorage.setItem('aion2_mem_alert_last', new Date().toISOString());
}

// ====== 基纳统计弹窗 ======
let kinaDraft = {};     // { "accId-chId": number|null } 当前编辑值
let kinaInitial = {};   // 打开时/保存后的快照，用于改动检测

function kinaKey(accId, chId) { return accId + '-' + chId; }

function formatKina(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Number(n).toLocaleString('en-US');
}

function parseKinaVal(v) {
  if (v === null || v === undefined || String(v).trim() === '') return null;
  const n = parseInt(String(v).replace(/,/g, ''), 10);
  if (isNaN(n) || n < 0) return null;
  return n;
}

function kinaInputKeydown(e) {
  // 禁止小数点、负号、科学计数法，保持纯非负整数输入
  if (e.key === '.' || e.key === '-' || e.key === 'e' || e.key === 'E') return false;
  return true;
}

// 聚焦时切换为纯数字方便编辑，失焦时切换为千分位显示
function kinaInputFocus(el, accId, chId) {
  const v = kinaDraft[kinaKey(accId, chId)];
  el.value = (v === null || v === undefined) ? '' : String(v);
}
function kinaInputBlur(el, accId, chId) {
  const v = kinaDraft[kinaKey(accId, chId)];
  el.value = (v === null || v === undefined) ? '' : formatKina(v);
}

function accKinaSum(accId) {
  const acc = DATA.accounts.find(a => a.id === accId);
  if (!acc) return 0;
  let sum = 0;
  acc.characters.forEach(ch => {
    const v = kinaDraft[kinaKey(accId, ch.id)];
    if (v !== null && v !== undefined && !isNaN(v)) sum += v;
  });
  return sum;
}

function totalKina() {
  let sum = 0;
  DATA.accounts.forEach(acc => {
    acc.characters.forEach(ch => {
      const v = kinaDraft[kinaKey(acc.id, ch.id)];
      if (v !== null && v !== undefined && !isNaN(v)) sum += v;
    });
  });
  return sum;
}

function updateKinaAccSum(accId) {
  const el = document.getElementById('kinaAccSum-' + accId);
  if (el) el.textContent = formatKina(accKinaSum(accId));
}

function updateKinaTotal() {
  const el = document.getElementById('kinaTotalVal');
  if (el) el.textContent = formatKina(totalKina());
}

function updateKinaTotalAndSum() {
  updateKinaTotal();
  DATA.accounts.forEach(acc => updateKinaAccSum(acc.id));
}

function kinaIsDirty() {
  const keys = new Set([...Object.keys(kinaDraft), ...Object.keys(kinaInitial)]);
  for (const k of keys) {
    const a = (kinaDraft[k] === undefined) ? null : kinaDraft[k];
    const b = (kinaInitial[k] === undefined) ? null : kinaInitial[k];
    if (a !== b) return true;
  }
  return false;
}

function updateKinaSaveBtn() {
  const btn = document.getElementById('kinaSaveBtn');
  if (btn) btn.disabled = !kinaIsDirty();
}

function openKinaModal() {
  kinaDraft = {};
  kinaInitial = {};
  DATA.accounts.forEach(acc => {
    acc.characters.forEach(ch => {
      const k = kinaKey(acc.id, ch.id);
      const v = (ch.kina === null || ch.kina === undefined) ? null : ch.kina;
      kinaDraft[k] = v;
      kinaInitial[k] = v;
    });
  });
  renderKinaList();
  const confirmEl = document.getElementById('kinaConfirmOverlay');
  const modalEl = document.getElementById('kinaModalOverlay');
  if (confirmEl) { confirmEl.classList.remove('show'); confirmEl.style.display = 'none'; }
  if (modalEl) { modalEl.classList.add('show'); modalEl.style.display = 'flex'; }
}

function renderKinaList() {
  const body = document.getElementById('kinaListBody');
  if (DATA.accounts.length === 0) {
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-faint);font-size:13px">暂无账号数据</div>';
    updateKinaTotalAndSum();
    updateKinaSaveBtn();
    return;
  }
  let html = '';
  DATA.accounts.forEach(acc => {
    const charRows = acc.characters.map(ch => {
      const k = kinaKey(acc.id, ch.id);
      const v = kinaDraft[k];
      const icon = (ch.charClass && typeof CLASS_ICONS !== 'undefined' && CLASS_ICONS[ch.charClass])
        ? `<img class="kina-char-icon" src="${CLASS_ICONS[ch.charClass]}" alt="" draggable="false" />`
        : `<span class="kina-char-icon-fallback">👤</span>`;
      return `<div class="kina-char-row">
        ${icon}
        <span class="kina-char-name">${escapeHtml(ch.name || '未命名')}</span>
        <input class="kina-char-input" type="text" inputmode="numeric" placeholder="0"
          value="${v === null || v === undefined ? '' : formatKina(v)}"
          onfocus="kinaInputFocus(this,'${acc.id}','${ch.id}')"
          onblur="kinaInputBlur(this,'${acc.id}','${ch.id}')"
          oninput="onKinaInput('${acc.id}','${ch.id}',this.value)"
          onkeydown="return kinaInputKeydown(event)" />
      </div>`;
    }).join('');
    html += `<div class="kina-acc-block">
      <div class="kina-acc-row">
        <span class="kina-acc-name">${escapeHtml(acc.name || '未命名账号')}</span>
        <span class="kina-acc-sum" id="kinaAccSum-${acc.id}">0</span>
      </div>
      <div class="kina-char-list">${charRows || '<div style="padding:6px 24px;color:var(--text-faint);font-size:12px">暂无角色</div>'}</div>
    </div>`;
  });
  body.innerHTML = html;
  updateKinaTotalAndSum();
  updateKinaSaveBtn();
}

function onKinaInput(accId, chId, val) {
  kinaDraft[kinaKey(accId, chId)] = parseKinaVal(val);
  updateKinaAccSum(accId);
  updateKinaTotal();
  updateKinaSaveBtn();
}

function saveKina() {
  if (!kinaIsDirty()) return;
  DATA.accounts.forEach(acc => {
    acc.characters.forEach(ch => {
      const v = kinaDraft[kinaKey(acc.id, ch.id)];
      ch.kina = (v === null || v === undefined) ? null : v;
    });
  });
  saveData();
  kinaInitial = {};
  Object.keys(kinaDraft).forEach(k => { kinaInitial[k] = kinaDraft[k]; });
  updateKinaSaveBtn();
  updateSummary();
  showToast('基纳数据已保存');
}

function closeKinaModal() {
  if (kinaIsDirty()) {
    var el = document.getElementById('kinaConfirmOverlay');
    if (el) { el.classList.add('show'); el.style.display = 'flex'; }
    return;
  }
  var el = document.getElementById('kinaModalOverlay');
  if (el) { el.classList.remove('show'); el.style.display = 'none'; }
}

function discardKinaAndClose() {
  var c = document.getElementById('kinaConfirmOverlay');
  var m = document.getElementById('kinaModalOverlay');
  if (c) { c.classList.remove('show'); c.style.display = 'none'; }
  if (m) { m.classList.remove('show'); m.style.display = 'none'; }
}

function saveKinaAndClose() {
  saveKina();
  var c = document.getElementById('kinaConfirmOverlay');
  var m = document.getElementById('kinaModalOverlay');
  if (c) { c.classList.remove('show'); c.style.display = 'none'; }
  if (m) { m.classList.remove('show'); m.style.display = 'none'; }
}

// ====== 云同步 ======
const SYNC_API = '/api/sync';
const SYNC_PASSPHRASE_KEY = 'aion2_sync_passphrase';
let syncDebounceTimer = null;
let _syncCloudCache = null;

function _sha256Sync(str) {
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  function R(x,n){return(x>>>n)|(x<<(32-n));}
  var m=[];
  for(var i=0;i<str.length;i++){
    var c=str.codePointAt(i);
    if(c<0x80)m.push(c);
    else if(c<0x800){m.push(0xc0|(c>>6),0x80|(c&0x3f));}
    else if(c<0x10000){m.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));}
    else{m.push(0xf0|(c>>18),0x80|((c>>12)&0x3f),0x80|((c>>6)&0x3f),0x80|(c&0x3f));i++;}
  }
  var l=m.length*8;
  m.push(0x80);
  while(m.length%64!==56)m.push(0);
  m.push(0,0,0,0,(l>>>24)&0xff,(l>>>16)&0xff,(l>>>8)&0xff,l&0xff);
  var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
  for(var o=0;o<m.length;o+=64){
    var W=[];
    for(var i=0;i<16;i++)W[i]=(m[o+i*4]<<24)|(m[o+i*4+1]<<16)|(m[o+i*4+2]<<8)|m[o+i*4+3];
    for(var i=16;i<64;i++){var s0=R(W[i-15],7)^R(W[i-15],18)^(W[i-15]>>>3);var s1=R(W[i-2],17)^R(W[i-2],19)^(W[i-2]>>>10);W[i]=(W[i-16]+s0+W[i-7]+s1)|0;}
    var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
    for(var i=0;i<64;i++){var S1=R(e,6)^R(e,11)^R(e,25);var ch=(e&f)^(~e&g);var t1=(h+S1+ch+K[i]+W[i])|0;var S0=R(a,2)^R(a,13)^R(a,22);var mj=(a&b)^(a&c)^(b&c);var t2=(S0+mj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;}
    H[0]=(H[0]+a)|0;H[1]=(H[1]+b)|0;H[2]=(H[2]+c)|0;H[3]=(H[3]+d)|0;H[4]=(H[4]+e)|0;H[5]=(H[5]+f)|0;H[6]=(H[6]+g)|0;H[7]=(H[7]+h)|0;
  }
  return H.map(function(v){return(v>>>0).toString(16).padStart(8,'0');}).join('');
}

async function hashPassphrase(passphrase) {
  try {
    if (typeof crypto !== 'undefined' && crypto.subtle) {
      var enc = new TextEncoder().encode(passphrase);
      var buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    }
  } catch(e) {}
  return _sha256Sync(passphrase);
}

function getSyncPassphrase() { return localStorage.getItem(SYNC_PASSPHRASE_KEY); }

function updateSyncStatus(state) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync-status ' + state;
  if (state === 'synced') el.innerHTML = '<span class="sync-dot"></span> 已同步';
  else if (state === 'syncing') el.innerHTML = '<span class="sync-dot"></span> 同步中...';
  else if (state === 'error') el.innerHTML = '<span class="sync-dot"></span> 同步失败';
  else el.innerHTML = '';
}

function openSyncModal() {
  const passphrase = getSyncPassphrase();
  const overlay = document.getElementById('syncModalOverlay');
  const content = document.getElementById('syncModalContent');
  var closeBtn = '<button class="sync-modal-close" onclick="closeSyncModal()" title="关闭">\u00d7</button>';
  if (location.protocol === 'file:') {
    content.innerHTML = closeBtn +
      '<h3>☁ 云同步</h3>' +
      '<p>云同步功能需要将页面部署到线上后才能使用。当前以本地文件方式打开，无法连接同步服务。</p>' +
      '<p style="font-size:12px;color:var(--text-faint)">你仍然可以使用导出/导入功能手动传输数据。</p>';
  } else if (passphrase) {
    content.innerHTML = closeBtn +
      '<h3>☁ 云同步设置</h3>' +
      '<p>当前口令：<strong style="color:var(--cyan)">' + escapeHtml(passphrase) + '</strong></p>' +
      '<p style="font-size:12px;color:var(--text-faint)">数据保存时自动同步到云端，打开页面时自动拉取。<br>云端数据超过 30 天未同步将自动清除。</p>' +
      '<div class="sync-modal-actions">' +
        '<button class="sync-btn" onclick="changeSyncPassphrase()">修改口令</button>' +
        '<button class="sync-btn" onclick="clearSyncPassphrase()">清除口令</button>' +
        '<button class="sync-btn" onclick="manualSyncPush()">手动推送</button>' +
        '<button class="sync-btn" onclick="manualSyncPull()">手动拉取</button>' +
      '</div>';
  } else {
    content.innerHTML = closeBtn +
      '<h3>☁ 设置同步口令</h3>' +
      '<p>设置一个口令用于跨设备同步数据。在另一台设备上输入相同口令即可获取数据。</p>' +
      '<input class="sync-input" id="syncPassphraseInput" type="text" placeholder="输入你的同步口令" autocomplete="off" />' +
      '<p style="font-size:12px;color:var(--text-faint)">口令是你的数据唯一标识，请牢记。忘记口令可通过导入/导出恢复数据。</p>' +
      '<div class="sync-modal-actions cols-2">' +
        '<button class="sync-btn" onclick="closeSyncModal()">取消</button>' +
        '<button class="sync-btn primary" onclick="confirmSyncPassphrase()">确认</button>' +
      '</div>';
    setTimeout(function() {
      var inp = document.getElementById('syncPassphraseInput');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') confirmSyncPassphrase(); });
      }
    }, 100);
  }
  overlay.classList.add('show');
  overlay.style.display = 'flex';
}

function closeSyncModal() {
  var el = document.getElementById('syncModalOverlay');
  if (el) { el.classList.remove('show'); el.style.display = 'none'; }
}

var _isFirstSync = false;

async function confirmSyncPassphrase() {
  var inp = document.getElementById('syncPassphraseInput');
  if (!inp) return;
  var passphrase = inp.value.trim();
  if (!passphrase || passphrase.length < 2) {
    inp.style.borderColor = 'var(--red)';
    showToast('口令至少需要2个字符');
    return;
  }
  localStorage.setItem(SYNC_PASSPHRASE_KEY, passphrase);
  closeSyncModal();
  showToast('同步口令已设置');
  _isFirstSync = true;
  await syncOnLoad();
  _isFirstSync = false;
}

function changeSyncPassphrase() {
  localStorage.removeItem(SYNC_PASSPHRASE_KEY);
  updateSyncStatus('off');
  openSyncModal();
}

function clearSyncPassphrase() {
  if (!confirm('清除口令后将停止云同步，确定继续？')) return;
  localStorage.removeItem(SYNC_PASSPHRASE_KEY);
  updateSyncStatus('off');
  closeSyncModal();
  showToast('同步口令已清除');
}

async function syncPush() {
  var passphrase = getSyncPassphrase();
  if (!passphrase || location.protocol === 'file:') return;
  try {
    updateSyncStatus('syncing');
    var token = await hashPassphrase(passphrase);
    var payload = JSON.stringify({
      data: DATA,
      lastModified: DATA._lastModified || new Date().toISOString(),
      exists: true
    });
    var res = await fetch(SYNC_API, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Sync-Token': token },
      body: payload
    });
    updateSyncStatus(res.ok ? 'synced' : 'error');
  } catch(e) {
    console.error('Sync push error:', e);
    updateSyncStatus('error');
    showToast('推送出错: ' + (e.message || e));
  }
}

function debouncedSyncPush() {
  if (!getSyncPassphrase() || location.protocol === 'file:') return;
  if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(function() { syncPush(); }, 2000);
}

async function syncPull() {
  var passphrase = getSyncPassphrase();
  if (!passphrase) return null;
  var token = await hashPassphrase(passphrase);
  var res = await fetch(SYNC_API, {
    method: 'GET',
    headers: { 'X-Sync-Token': token }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function manualSyncPull() {
  closeSyncModal();
  await syncOnLoad();
}

async function manualSyncPush() {
  closeSyncModal();
  await syncPush();
  if (document.getElementById('syncStatus').classList.contains('error')) {
    showToast('推送失败，请检查网络');
  } else {
    showToast('数据已推送到云端');
  }
}

function formatSyncTime(iso) {
  if (!iso) return '无记录';
  try {
    var d = new Date(iso);
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0') + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0') + ':' +
      String(d.getSeconds()).padStart(2,'0');
  } catch(e) { return '未知'; }
}

async function syncOnLoad() {
  var passphrase = getSyncPassphrase();
  if (!passphrase || location.protocol === 'file:') { updateSyncStatus('off'); return; }
  updateSyncStatus('syncing');
  try {
    var cloud = await syncPull();
    if (!cloud || cloud.exists === false) {
      if (DATA.accounts && DATA.accounts.length > 0) {
        await syncPush();
        showToast('本地数据已同步到云端');
      } else {
        updateSyncStatus('synced');
      }
      return;
    }
    var localMod = DATA._lastModified;
    var cloudMod = cloud.lastModified;
    if (localMod && localMod === cloudMod) {
      updateSyncStatus('synced');
      return;
    }
    showSyncConflictDialog(localMod, cloudMod, cloud.data, _isFirstSync);
  } catch(e) {
    console.error('Sync load error:', e);
    updateSyncStatus('error');
    showToast('同步出错: ' + (e.message || e));
  }
}

function showSyncConflictDialog(localMod, cloudMod, cloudData, isFirstSync) {
  _syncCloudCache = { data: cloudData, modified: cloudMod };
  var localAcc = DATA.accounts ? DATA.accounts.length : 0;
  var cloudAcc = cloudData && cloudData.accounts ? cloudData.accounts.length : 0;
  var overlay = document.getElementById('syncModalOverlay');
  var content = document.getElementById('syncModalContent');
  var title = isFirstSync ? '<h3>\u26a0 该口令已有云端数据</h3>' : '<h3>\u26a0 数据不一致</h3>';
  var desc = isFirstSync
    ? '<p>该口令下已有云端数据，请确认是否为你的数据。如果不是，请更换口令。</p>'
    : '<p>本地数据和云端数据不一致，请选择保留哪一份：</p>';
  var actions = isFirstSync
    ? '<div class="sync-conflict-actions">' +
        '<button class="sync-btn" onclick="resolveConflict(\'change\')" style="flex:1">换一个口令</button>' +
        '<button class="sync-btn use-cloud" onclick="resolveConflict(\'cloud\')" style="flex:1">这是我的数据</button>' +
      '</div>'
    : '<div class="sync-conflict-actions">' +
        '<button class="sync-btn use-local" onclick="resolveConflict(\'local\')" style="flex:1">使用本地数据</button>' +
        '<button class="sync-btn use-cloud" onclick="resolveConflict(\'cloud\')" style="flex:1">使用云端数据</button>' +
      '</div>';
  content.innerHTML = title + desc +
    '<div class="sync-conflict-info">' +
      '<div class="sync-conflict-row"><span class="label">\ud83d\udcf1 本地数据</span><span class="time">' + formatSyncTime(localMod) + '</span></div>' +
      '<div class="sync-conflict-row" style="font-size:12px;color:var(--text-faint)"><span>' + localAcc + ' 个账号</span></div>' +
      '<div style="border-top:1px solid var(--border);margin:8px 0"></div>' +
      '<div class="sync-conflict-row"><span class="label">☁ 云端数据</span><span class="time">' + formatSyncTime(cloudMod) + '</span></div>' +
      '<div class="sync-conflict-row" style="font-size:12px;color:var(--text-faint)"><span>' + cloudAcc + ' 个账号</span></div>' +
    '</div>' + actions;
  overlay.classList.add('show');
  overlay.style.display = 'flex';
}

async function resolveConflict(choice) {
  if (choice === 'change') {
    localStorage.removeItem(SYNC_PASSPHRASE_KEY);
    updateSyncStatus('off');
    _syncCloudCache = null;
    openSyncModal();
    return;
  }
  closeSyncModal();
  if (choice === 'local') {
    await syncPush();
    showToast('已使用本地数据覆盖云端');
  } else if (_syncCloudCache && _syncCloudCache.data) {
    var cd = _syncCloudCache.data;
    if (cd.accounts) cd.accounts.forEach(ensureAccDefaults);
    DATA = cd;
    DATA._lastModified = _syncCloudCache.modified;
    dirtyChars.clear();
    dirtyAccounts.clear();
    localStorage.setItem('aion2_aion_tracker_v2', JSON.stringify(DATA));
    render();
    updateSyncStatus('synced');
    showToast('已使用云端数据');
  }
  _syncCloudCache = null;
}

// ====== 今日活动 ======
var _activityData = [
  { day: 0, time: "22:00", name: "神将" },
  { day: 2, time: "22:00", name: "深渊裂缝地带" },
  { day: 3, time: "22:00", name: "神器战" },
  { day: 4, time: "22:00", name: "深渊裂缝地带" },
  { day: 5, time: "22:00", name: "神将" },
  { day: 6, time: "22:00", name: "神器战" }
];
var _activityScrollTimer = null;
var _activityScrollIdx = 0;
var _activityPinned = false;

var DAY_NAMES = ['周日','周一','周二','周三','周四','周五','周六'];

function loadActivities() {
  if (location.protocol === 'file:') { renderTodayActivities(); return; }
  fetch('/activities.json?_t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { _activityData = data; renderTodayActivities(); })
    .catch(function() { renderTodayActivities(); });
}

function getTodayActivities() {
  var now = new Date();
  var today = now.getDay();
  var items = [];
  _activityData.forEach(function(act) {
    if (act.day !== today) return;
    var parts = act.time.split(':');
    var actH = parseInt(parts[0], 10);
    var actM = parseInt(parts[1], 10);
    var actDate = new Date(now);
    actDate.setHours(actH, actM, 0, 0);
    var diff = actDate.getTime() - now.getTime();
    if (diff < -60000) return;
    var urgent = diff > 0 && diff <= 5 * 60 * 1000;
    items.push({ time: act.time, name: act.name, urgent: urgent, diff: diff });
  });
  items.sort(function(a, b) { return a.diff - b.diff; });
  return items;
}

function renderTodayActivities() {
  var wrap = document.getElementById('todayActivities');
  var body = document.getElementById('todayActivitiesBody');
  if (!wrap || !body) return;
  var items = getTodayActivities();
  if (items.length === 0) { wrap.style.display = 'none'; stopActivityScroll(); return; }
  wrap.style.display = '';
  body.innerHTML = items.map(function(it, i) {
    return '<div class="activity-item' + (it.urgent ? ' urgent' : '') + '" data-idx="' + i + '">' +
      '<span class="act-time">' + it.time + '</span>' +
      '<span class="act-name">' + it.name + '</span></div>';
  }).join('');

  if (items.length > 2) {
    startActivityScroll(items);
  } else {
    stopActivityScroll();
  }
}

function startActivityScroll(items) {
  stopActivityScroll();
  var body = document.getElementById('todayActivitiesBody');
  if (!body) return;
  var urgentIdx = -1;
  items.forEach(function(it, i) { if (it.urgent && urgentIdx === -1) urgentIdx = i; });

  if (urgentIdx !== -1) {
    _activityPinned = true;
    _activityScrollIdx = urgentIdx;
    showActivityAtIndex(body, urgentIdx);
  } else {
    _activityPinned = false;
    _activityScrollIdx = 0;
    showActivityAtIndex(body, 0);
  }

  _activityScrollTimer = setInterval(function() {
    if (_activityPinned) {
      var fresh = getTodayActivities();
      var stillUrgent = fresh.some(function(it) { return it.urgent; });
      if (!stillUrgent) _activityPinned = false;
      else return;
    }
    var allItems = body.querySelectorAll('.activity-item');
    if (allItems.length <= 2) { stopActivityScroll(); return; }
    _activityScrollIdx = (_activityScrollIdx + 1) % allItems.length;
    showActivityAtIndex(body, _activityScrollIdx);
  }, 4000);
}

function showActivityAtIndex(body, idx) {
  var items = body.querySelectorAll('.activity-item');
  items.forEach(function(el, i) {
    el.style.display = (i === idx || i === idx + 1 || (idx === items.length - 1 && i === 0)) ? '' : 'none';
  });
}

function stopActivityScroll() {
  if (_activityScrollTimer) { clearInterval(_activityScrollTimer); _activityScrollTimer = null; }
}

// ====== Init ======
loadData();
render();
checkMembershipAlert();
loadActivities();
setInterval(function() { renderTodayActivities(); }, 60000);
setInterval(updateRecoveryDisplay, 30000);
syncOnLoad();
</script>
